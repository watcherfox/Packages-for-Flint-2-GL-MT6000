name: Build luci-app-smartdns apk

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Версия OpenWrt (релиз, напр. 25.12.5)'
        required: true
        default: '25.12.5'
      target:
        description: 'target'
        required: true
        default: 'mediatek'
      subtarget:
        description: 'subtarget'
        required: true
        default: 'filogic'
      luci_smartdns_ref:
        description: 'Ветка/тег репозитория luci-app-smartdns'
        required: true
        default: 'master'
      smartdns_ref:
        description: 'Ветка/тег репозитория openwrt-smartdns (нужен для резолва зависимости +smartdns)'
        required: true
        default: 'master'
      include_smartdns_ui:
        description: 'Включить опцию smartdns-ui в самом luci-app-smartdns'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip python3 zstd file \
            gcc-multilib g++-multilib

      - name: Locate SDK filename on downloads.openwrt.org
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ inputs.openwrt_version }}/targets/${{ inputs.target }}/${{ inputs.subtarget }}"
          echo "BASE=$BASE" >> "$GITHUB_ENV"
          SDK_FILE=$(curl -fsSL "$BASE/" | grep -oE 'openwrt-sdk-[A-Za-z0-9._-]+\.tar\.(zst|xz)' | head -n1)
          if [ -z "$SDK_FILE" ]; then
            echo "Не нашёл SDK-файл в $BASE — проверьте version/target/subtarget" >&2
            exit 1
          fi
          echo "SDK_FILE=$SDK_FILE" >> "$GITHUB_ENV"
          echo "Found: $SDK_FILE"

      - name: Download and extract SDK
        run: |
          wget -q "$BASE/$SDK_FILE"
          case "$SDK_FILE" in
            *.tar.zst) tar --zstd -xf "$SDK_FILE" ;;
            *.tar.xz)  tar -xJf "$SDK_FILE" ;;
          esac
          SDK_DIR=$(echo "$SDK_FILE" | sed -E 's/\.tar\.(zst|xz)$//')
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Add smartdns + luci-app-smartdns feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a

          # зависимость +smartdns должна резолвиться, поэтому кладём и её
          rm -rf feeds/packages/net/smartdns
          git clone --depth 1 --branch "${{ inputs.smartdns_ref }}" \
            https://github.com/pymumu/openwrt-smartdns feeds/packages/net/smartdns

          rm -rf feeds/luci/applications/luci-app-smartdns
          git clone --depth 1 --branch "${{ inputs.luci_smartdns_ref }}" \
            https://github.com/pymumu/luci-app-smartdns feeds/luci/applications/luci-app-smartdns

          ./scripts/feeds install -a
          ./scripts/feeds install smartdns
          ./scripts/feeds install luci-app-smartdns

      - name: Configure .config
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "CONFIG_PACKAGE_smartdns=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-smartdns=m" >> .config
          if [ "${{ inputs.include_smartdns_ui }}" = "true" ]; then
            echo "CONFIG_PACKAGE_luci-app-smartdns_INCLUDE_smartdns_ui=y" >> .config
          fi
          make defconfig

      - name: Build luci-app-smartdns
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/feeds/luci/applications/luci-app-smartdns/compile V=s -j"$(nproc)"

      - name: Collect apk artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p /tmp/out
          find bin/packages -name 'luci-app-smartdns*.apk' -exec cp {} /tmp/out \;
          find bin/packages -name 'luci-app-smartdns*.ipk' -exec cp {} /tmp/out \;
          ls -la /tmp/out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-smartdns-${{ inputs.openwrt_version }}
          path: |
            /tmp/out/*.apk
            /tmp/out/*.ipk
          if-no-files-found: error
