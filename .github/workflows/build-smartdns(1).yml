name: Build SmartDNS ipk

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Версия OpenWrt (релиз, напр. 25.12.5). С 25.12 сборка идёт в формате apk.'
        required: true
        default: '25.12.5'
      target:
        description: 'target'
        required: true
        default: 'mediatek'
      subtarget:
        description: 'subtarget'
        required: true
        default: 'filogic'
      smartdns_ref:
        description: 'Ветка/тег репозитория openwrt-smartdns'
        required: true
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip python3 zstd file \
            gcc-multilib g++-multilib

      - name: Locate SDK filename on downloads.openwrt.org
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ inputs.openwrt_version }}/targets/${{ inputs.target }}/${{ inputs.subtarget }}"
          echo "BASE=$BASE" >> "$GITHUB_ENV"
          SDK_FILE=$(curl -fsSL "$BASE/" | grep -oE 'openwrt-sdk-[A-Za-z0-9._-]+\.tar\.(zst|xz)' | head -n1)
          if [ -z "$SDK_FILE" ]; then
            echo "Не нашёл SDK-файл в $BASE — проверьте version/target/subtarget" >&2
            exit 1
          fi
          echo "SDK_FILE=$SDK_FILE" >> "$GITHUB_ENV"
          echo "Found: $SDK_FILE"

      - name: Download and extract SDK
        run: |
          wget -q "$BASE/$SDK_FILE"
          case "$SDK_FILE" in
            *.tar.zst) tar --zstd -xf "$SDK_FILE" ;;
            *.tar.xz)  tar -xJf "$SDK_FILE" ;;
          esac
          SDK_DIR=$(echo "$SDK_FILE" | sed -E 's/\.tar\.(zst|xz)$//')
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Add smartdns feed and install
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ulimit -n 65536 || true
          ./scripts/feeds update -a
          rm -rf feeds/packages/net/smartdns
          git clone --depth 1 --branch "${{ inputs.smartdns_ref }}" \
            https://github.com/pymumu/openwrt-smartdns feeds/packages/net/smartdns

          # Makefile тянет smartdns-webui безусловно (даже когда smartdns-ui
          # выключен), но не закрепляет его за тегом/коммитом — хеш в Makefile
          # регулярно расходится с текущим HEAD репозитория smartdns-webui и
          # валит сборку. Раз smartdns-ui нам не нужен, глушим проверку хеша.
          sed -i 's/42e280cbfc168f88690652b85ce919c2aeedc9ef7c4b55122742e484b23492cd/skip/' \
            feeds/packages/net/smartdns/Makefile

          ./scripts/feeds install smartdns

      - name: Configure .config
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ulimit -n 65536 || true
          echo "CONFIG_PACKAGE_smartdns=m" >> .config
          # defconfig сам включает smartdns-ui по дефолту, если включён smartdns —
          # приходится гасить явно, иначе сборка упирается в чужой незакреплённый
          # хеш smartdns-webui и отсутствующий rust/host
          echo "CONFIG_PACKAGE_smartdns-ui=n" >> .config
          make defconfig

      - name: Build smartdns
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ulimit -n 65536 || true
          make package/feeds/packages/smartdns/compile V=s -j"$(nproc)"

      - name: Dump real error logs on failure
        if: failure()
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "=== .config относящиеся к smartdns ==="
          grep -i smartdns .config || true
          echo "=== Поиск логов сборки ==="
          find logs -iname '*.txt' 2>/dev/null | while read -r f; do
            echo "----- $f -----"
            tail -n 200 "$f"
          done

      - name: Collect apk artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p /tmp/out
          find bin/packages -name 'smartdns*.apk' -exec cp {} /tmp/out \;
          ls -la /tmp/out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-pkg-${{ inputs.openwrt_version }}-${{ inputs.target }}-${{ inputs.subtarget }}
          path: /tmp/out/*.apk
          if-no-files-found: error
