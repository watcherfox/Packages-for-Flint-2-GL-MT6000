name: Build SmartDNS ipk

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Версия OpenWrt (релиз, напр. 25.12.5). С 25.12 сборка идёт в формате apk.'
        required: true
        default: '25.12.5'
      target:
        description: 'target'
        required: true
        default: 'mediatek'
      subtarget:
        description: 'subtarget'
        required: true
        default: 'filogic'
      smartdns_ref:
        description: 'Ветка/тег репозитория openwrt-smartdns'
        required: true
        default: 'master'
      build_ui:
        description: 'Собирать также smartdns-ui (нужен rust+npm, дольше)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip python3 zstd file \
            gcc-multilib g++-multilib

      - name: Locate SDK filename on downloads.openwrt.org
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ inputs.openwrt_version }}/targets/${{ inputs.target }}/${{ inputs.subtarget }}"
          echo "BASE=$BASE" >> "$GITHUB_ENV"
          SDK_FILE=$(curl -fsSL "$BASE/" | grep -oE 'openwrt-sdk-[A-Za-z0-9._-]+\.tar\.(zst|xz)' | head -n1)
          if [ -z "$SDK_FILE" ]; then
            echo "Не нашёл SDK-файл в $BASE — проверьте version/target/subtarget" >&2
            exit 1
          fi
          echo "SDK_FILE=$SDK_FILE" >> "$GITHUB_ENV"
          echo "Found: $SDK_FILE"

      - name: Download and extract SDK
        run: |
          wget -q "$BASE/$SDK_FILE"
          case "$SDK_FILE" in
            *.tar.zst) tar --zstd -xf "$SDK_FILE" ;;
            *.tar.xz)  tar -xJf "$SDK_FILE" ;;
          esac
          SDK_DIR=$(echo "$SDK_FILE" | sed -E 's/\.tar\.(zst|xz)$//')
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Add smartdns feed and install
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          rm -rf feeds/packages/net/smartdns
          git clone --depth 1 --branch "${{ inputs.smartdns_ref }}" \
            https://github.com/pymumu/openwrt-smartdns feeds/packages/net/smartdns
          ./scripts/feeds install -a
          ./scripts/feeds install smartdns
          if [ "${{ inputs.build_ui }}" = "true" ]; then
            ./scripts/feeds install smartdns-ui
          fi

      - name: Configure .config
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "CONFIG_PACKAGE_smartdns=m" >> .config
          if [ "${{ inputs.build_ui }}" = "true" ]; then
            echo "CONFIG_PACKAGE_smartdns-ui=m" >> .config
          fi
          make defconfig

      - name: Build smartdns
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/feeds/packages/smartdns/compile V=s -j"$(nproc)"

      - name: Collect apk artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p /tmp/out
          find bin/packages -name 'smartdns*.apk' -exec cp {} /tmp/out \;
          ls -la /tmp/out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-pkg-${{ inputs.openwrt_version }}-${{ inputs.target }}-${{ inputs.subtarget }}
          path: /tmp/out/*.apk
          if-no-files-found: error
