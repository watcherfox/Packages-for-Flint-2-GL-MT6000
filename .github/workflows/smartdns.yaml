name: Build smartdns (Flint2 pymumu)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SDK_URL: https://downloads.openwrt.org/releases/25.12.5/targets/mediatek/filogic/openwrt-sdk-25.12.5-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst
      SDK_DIR: openwrt-sdk

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools rsync unzip zlib1g-dev \
            file wget

      - name: Download OpenWrt SDK
        run: |
          wget $SDK_URL -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* $SDK_DIR

      - name: Prepare feeds
        run: |
          cd $SDK_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Fix broken nginx (avoid recursive dependency bug)
        run: |
          cd $SDK_DIR
          rm -rf feeds/packages/net/nginx*

      - name: Clone smartdns (pymumu)
        run: |
          git clone https://github.com/pymumu/openwrt-smartdns.git
          mkdir -p $SDK_DIR/package/smartdns
          cp -r openwrt-smartdns/* $SDK_DIR/package/smartdns/

      - name: Disable smartdns webui (remove rust dependency)
        run: |
          sed -i '/smartdns-ui/d' $SDK_DIR/package/smartdns/Makefile

      - name: Fix permissions
        run: |
          chmod -R +x $SDK_DIR/package/smartdns

      - name: Configure build
        run: |
          cd $SDK_DIR
          make defconfig

      - name: Build smartdns
        run: |
          cd $SDK_DIR
          make package/smartdns/compile V=s -j$(nproc)

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-ipk
          path: ${{ env.SDK_DIR }}/bin/packages/*/*/smartdns*.ipk
