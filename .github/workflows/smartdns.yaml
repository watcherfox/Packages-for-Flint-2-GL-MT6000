name: Build SmartDNS 48.2 (Flint2 / OpenWrt 25.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OPENWRT_VERSION: 25.12.5
      TARGET: mediatek
      SUBTARGET: filogic
      SMARTDNS_VERSION: 48.2

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip python3 zstd file \
            gcc-multilib g++-multilib

      - name: Download OpenWrt SDK
        run: |
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${SUBTARGET}"
          SDK_FILE=$(curl -fsSL "$BASE_URL/" | grep -oE 'openwrt-sdk-.*\.tar\.(zst|xz)' | head -n1)

          if [ -z "$SDK_FILE" ]; then
            echo "Ошибка: Не удалось найти файл SDK по адресу $BASE_URL"
            exit 1
          fi

          wget "$BASE_URL/$SDK_FILE"

          case "$SDK_FILE" in
            *.zst) tar --zstd -xf "$SDK_FILE" ;;
            *.xz)  tar -xJf "$SDK_FILE" ;;
          esac

          echo "SDK_DIR=$(echo $SDK_FILE | sed 's/\.tar\..*//')" >> $GITHUB_ENV

      - name: Prepare feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create SmartDNS package (production)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p package/smartdns/files

          # ---------- Makefile ----------
          cat > package/smartdns/Makefile << 'EOF'
include $(TOPDIR)/rules.mk

PKG_NAME:=smartdns
PKG_VERSION:=48.2
PKG_RELEASE:=1

PKG_SOURCE_PROTO:=git
PKG_SOURCE_URL:=https://github.com/pymumu/smartdns.git
PKG_SOURCE_VERSION:=v$(PKG_VERSION)

PKG_MIRROR_HASH:=skip

PKG_LICENSE:=GPL-3.0
PKG_MAINTAINER:=builder

PKG_BUILD_DIR:=$(BUILD_DIR)/$(PKG_NAME)-$(PKG_VERSION)

include $(INCLUDE_DIR)/package.mk

define Package/smartdns
  SECTION:=net
  CATEGORY:=Network
  TITLE:=SmartDNS high-performance DNS forwarder
  DEPENDS:=+libpthread +libopenssl +ca-bundle
endef

define Package/smartdns/description
 SmartDNS improves DNS resolution speed using multiple upstream servers.
endef

# Блок Build/Compile удален — OpenWrt автоматически вызовет make 
# с правильными флагами кросс-компиляции (aarch64)

define Package/smartdns/install
	$(INSTALL_DIR) $(1)/usr/sbin
	$(INSTALL_BIN) $(PKG_BUILD_DIR)/src/smartdns $(1)/usr/sbin/

	$(INSTALL_DIR) $(1)/etc/init.d
	$(INSTALL_BIN) ./files/smartdns.init $(1)/etc/init.d/smartdns

	$(INSTALL_DIR) $(1)/etc/config
	$(INSTALL_CONF) ./files/smartdns.uci $(1)/etc/config/smartdns

	$(INSTALL_DIR) $(1)/etc/smartdns
	$(INSTALL_CONF) ./files/smartdns.conf $(1)/etc/smartdns/smartdns.conf
endef

$(eval $(call BuildPackage,smartdns))
EOF

          # ---------- init ----------
          cat > package/smartdns/files/smartdns.init << 'EOF'
#!/bin/sh /etc/rc.common
START=95
USE_PROCD=1

PROG=/usr/sbin/smartdns
CONF_RUNTIME=/var/etc/smartdns.conf

generate_config() {
    mkdir -p /var/etc
    echo "# Auto-generated" > $CONF_RUNTIME

    config_load smartdns

    config_get enabled main enabled 1
    [ "$enabled" = "0" ] && return 1

    config_get port main port 6053
    config_get bind main bind 127.0.0.1
    config_get cache main cache_size 8192

    echo "bind $bind:$port" >> $CONF_RUNTIME
    echo "cache-size $cache" >> $CONF_RUNTIME
    echo "prefetch-domain yes" >> $CONF_RUNTIME
    echo "dualstack-ip-selection yes" >> $CONF_RUNTIME
    echo "num-workers 4" >> $CONF_RUNTIME

    config_foreach add_server server

    # fallback если нет серверов
    grep -q "^server" $CONF_RUNTIME || echo "server 1.1.1.1" >> $CONF_RUNTIME
}

add_server() {
    config_get addr $1 address
    config_get type $1 type udp

    case "$type" in
        udp) echo "server $addr" >> $CONF_RUNTIME ;;
        tcp) echo "server-tcp $addr" >> $CONF_RUNTIME ;;
        tls) echo "server-tls $addr" >> $CONF_RUNTIME ;;
        https) echo "server-https $addr" >> $CONF_RUNTIME ;;
    esac
}

start_service() {
    generate_config || return 1
    procd_open_instance
    procd_set_param command $PROG -c $CONF_RUNTIME -f
    procd_set_param respawn
    procd_set_param stdout 1
    procd_set_param stderr 1
    procd_close_instance
}

reload_service() {
    generate_config
    procd_send_signal smartdns HUP
}
EOF

          chmod +x package/smartdns/files/smartdns.init

          # ---------- UCI ----------
          cat > package/smartdns/files/smartdns.uci << 'EOF'
config smartdns 'main'
	option enabled '1'
	option port '6053'
	option bind '127.0.0.1'
	option cache_size '8192'

config server
	option address '1.1.1.1'
	option type 'udp'

config server
	option address '8.8.8.8'
	option type 'udp'

config server
	option address '1.1.1.1'
	option type 'tls'

config server
	option address 'https://dns.google/dns-query'
	option type 'https'
EOF

          # ---------- fallback ----------
          cat > package/smartdns/files/smartdns.conf << 'EOF'
bind 127.0.0.1:6053
cache-size 8192
EOF

      - name: Configure build
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "CONFIG_PACKAGE_smartdns=m" >> .config
          make defconfig

      - name: Download sources
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/smartdns/download V=s

      - name: Compile
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/smartdns/compile V=s -j$(nproc) || \
          make package/smartdns/compile V=s -j1

      - name: Collect artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p /tmp/artifacts
          # Собираем все полученные .apk файлы (для OpenWrt 25.12)
          find bin/packages/ -name "*smartdns*.apk" -exec cp {} /tmp/artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-48.2-flint2
          path: /tmp/artifacts/*.apk
