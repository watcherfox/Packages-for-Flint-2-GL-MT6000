name: Build SmartDNS (official pymumu, OpenWrt 25.12, Flint2)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version (e.g. 25.12.5)'
        required: true
        default: '25.12.5'
      target:
        description: 'Target'
        required: true
        default: 'mediatek'
      subtarget:
        description: 'Subtarget'
        required: true
        default: 'filogic'
      smartdns_ref:
        description: 'Branch/tag for pymumu/openwrt-smartdns'
        required: true
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget zstd

      # Жёстко задаём SDK (без парсинга HTML)
      - name: Download OpenWrt SDK
        run: |
          SDK_FILE=openwrt-sdk-${{ inputs.openwrt_version }}-${{ inputs.target }}-${{ inputs.subtarget }}_gcc-13.2.0_musl.Linux-x86_64.tar.xz
          wget https://downloads.openwrt.org/releases/${{ inputs.openwrt_version }}/targets/${{ inputs.target }}/${{ inputs.subtarget }}/$SDK_FILE
          tar -xf $SDK_FILE
          mv openwrt-sdk-* sdk

      - name: Update feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone official SmartDNS package
        working-directory: sdk
        run: |
          git clone --depth 1 --branch "${{ inputs.smartdns_ref }}" \
            https://github.com/pymumu/openwrt-smartdns package/smartdns

      - name: Configure build
        working-directory: sdk
        run: |
          rm -rf tmp

          # включаем smartdns
          echo "CONFIG_PACKAGE_smartdns=m" >> .config

          # включаем apk формат
          echo "CONFIG_PACKAGE_apk=y" >> .config

          # оптимизация под MT7986 (Flint2)
          echo 'CONFIG_TARGET_OPTIMIZATION="-O3 -march=armv8-a+crypto -mtune=cortex-a53"' >> .config

          make defconfig

      - name: Build SmartDNS
        working-directory: sdk
        run: |
          make package/smartdns/compile V=s -j$(nproc) || \
          make package/smartdns/compile V=s -j1

      - name: Collect APK
        working-directory: sdk
        run: |
          mkdir -p /tmp/artifacts
          find bin/packages/ -type f -name "smartdns*.apk" -exec cp {} /tmp/artifacts/ \;
          ls -la /tmp/artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-${{ inputs.openwrt_version }}-filogic
          path: /tmp/artifacts/*.apk
          if-no-files-found: error
