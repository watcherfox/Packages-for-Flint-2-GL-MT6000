name: Build SmartDNS for Flint2 (GL-MT6000)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Версия OpenWrt (напр., 25.12.5). С версии 25.12 сборка идёт только в .apk'
        required: true
        default: '25.12.5'
      target:
        description: 'Target (Платформа)'
        required: true
        default: 'mediatek'
      subtarget:
        description: 'Subtarget (Архитектура процессора)'
        required: true
        default: 'filogic'
      smartdns_ref:
        description: 'Ветка или тег репозитория openwrt-smartdns'
        required: true
        default: 'master'
      build_luci:
        description: 'Собирать luci-app-smartdns (панель управления в LuCI)'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev zlib1g-dev gawk git gettext \
            libssl-dev xsltproc rsync wget unzip python3 zstd file \
            gcc-multilib g++-multilib

      - name: Locate SDK filename
        run: |
          BASE_URL="https://downloads.openwrt.org/releases/${{ inputs.openwrt_version }}/targets/${{ inputs.target }}/${{ inputs.subtarget }}"
          echo "BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          
          SDK_FILE=$(curl -fsSL "$BASE_URL/" | grep -oE 'openwrt-sdk-[A-Za-z0-9._-]+\.tar\.(zst|xz)' | head -n1)
          if [ -z "$SDK_FILE" ]; then
            echo "Ошибка: Не удалось найти SDK в директории $BASE_URL. Проверьте версию/таргет." >&2
            exit 1
          fi
          echo "SDK_FILE=$SDK_FILE" >> "$GITHUB_ENV"
          echo "Найден SDK: $SDK_FILE"

      - name: Cache SDK Archive
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk-cache
          key: sdk-${{ inputs.openwrt_version }}-${{ inputs.target }}-${{ inputs.subtarget }}

      - name: Download SDK
        run: |
          mkdir -p sdk-cache
          if [ ! -f "sdk-cache/$SDK_FILE" ]; then
            echo "Архив не найден в кэше. Скачиваю..."
            wget -q -O "sdk-cache/$SDK_FILE" "$BASE_URL/$SDK_FILE"
          else
            echo "Архив успешно получен из кэша GitHub."
          fi
          cp "
