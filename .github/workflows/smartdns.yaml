name: Build SmartDNS (Flint2 OpenWrt 25.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OPENWRT_VERSION: 25.12.5
      TARGET: mediatek
      SUBTARGET: filogic

    steps:
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev rsync unzip zlib1g-dev file wget zstd python3

      - name: Download SDK (stable)
        run: |
          URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${SUBTARGET}/"
          FILE=$(curl -s $URL | grep -oE 'openwrt-sdk-[^"]*\.tar\.zst' | head -n1)

          [ -z "$FILE" ] && exit 1

          wget ${URL}${FILE}
          tar --zstd -xf ${FILE}

          echo "SDK_DIR=${FILE%.tar.zst}" >> $GITHUB_ENV

      - name: Feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add official smartdns package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          git clone https://github.com/pymumu/openwrt-smartdns package/smartdns

      - name: Configure
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "CONFIG_PACKAGE_smartdns=m" >> .config
          make defconfig

      - name: Build
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/smartdns/compile V=s -j$(nproc)

      - name: Collect
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p /tmp/artifacts
          find bin/packages/ -name "*smartdns*.apk" -exec cp {} /tmp/artifacts/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-flint2
          path: /tmp/artifacts/*.apk
