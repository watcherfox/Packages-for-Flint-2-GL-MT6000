name: Build SmartDNS 48.2 (Flint2 / OpenWrt 25.12)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OPENWRT_VERSION: 25.12.5
      TARGET: mediatek
      SUBTARGET: filogic
      SMARTDNS_VERSION: 48.2

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev rsync unzip zlib1g-dev file wget zstd python3

      - name: Download OpenWrt SDK
        run: |
          URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${SUBTARGET}/"
          FILE=$(curl -s $URL | grep -o 'openwrt-sdk-[^"]*zst')

          wget ${URL}${FILE}
          tar --zstd -xf ${FILE}

          echo "SDK_DIR=$(echo $FILE | cut -d. -f1)" >> $GITHUB_ENV

      - name: Prepare feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create SmartDNS package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p package/smartdns/files

          cat > package/smartdns/Makefile << 'EOF'
include $(TOPDIR)/rules.mk

PKG_NAME:=smartdns
PKG_VERSION:=48.2
PKG_RELEASE:=1

PKG_SOURCE_PROTO:=git
PKG_SOURCE_URL:=https://github.com/pymumu/smartdns.git
PKG_SOURCE_VERSION:=v$(PKG_VERSION)

PKG_LICENSE:=GPL-3.0
PKG_MAINTAINER:=builder

PKG_BUILD_DIR:=$(BUILD_DIR)/$(PKG_NAME)-$(PKG_VERSION)

include $(INCLUDE_DIR)/package.mk

define Package/smartdns
  SECTION:=net
  CATEGORY:=Network
  TITLE:=SmartDNS high-performance DNS forwarder
  DEPENDS:=+libpthread +libopenssl +zlib
endef

define Package/smartdns/description
 SmartDNS DNS forwarder
endef

define Build/Compile
	$(MAKE) -C $(PKG_BUILD_DIR) \
		CC="$(TARGET_CC)" \
		CFLAGS="$(TARGET_CFLAGS)" \
		LDFLAGS="$(TARGET_LDFLAGS)"
endef

define Package/smartdns/install
	$(INSTALL_DIR) $(1)/usr/sbin
	$(INSTALL_BIN) $(PKG_BUILD_DIR)/src/smartdns $(1)/usr/sbin/

	$(INSTALL_DIR) $(1)/etc/init.d
	$(INSTALL_BIN) ./files/smartdns.init $(1)/etc/init.d/smartdns

	$(INSTALL_DIR) $(1)/etc/config
	$(INSTALL_CONF) ./files/smartdns.uci $(1)/etc/config/smartdns

	$(INSTALL_DIR) $(1)/etc/smartdns
	$(INSTALL_CONF) ./files/smartdns.conf $(1)/etc/smartdns/smartdns.conf
endef

$(eval $(call BuildPackage,smartdns))
EOF

          # INIT
          cat > package/smartdns/files/smartdns.init << 'EOF'
#!/bin/sh /etc/rc.common
START=95
USE_PROCD=1

PROG=/usr/sbin/smartdns
CONF=/var/etc/smartdns.conf

start_service() {
    mkdir -p /var/etc
    cp /etc/smartdns/smartdns.conf $CONF

    procd_open_instance
    procd_set_param command $PROG -c $CONF -f
    procd_set_param respawn
    procd_close_instance
}
EOF
          chmod +x package/smartdns/files/smartdns.init

          # CONFIG
          cat > package/smartdns/files/smartdns.conf << 'EOF'
bind 127.0.0.1:6053
cache-size 8192
server 1.1.1.1
server 8.8.8.8
EOF

          cat > package/smartdns/files/smartdns.uci << 'EOF'
config smartdns 'main'
  option enabled '1'
EOF

      - name: Configure build
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "CONFIG_PACKAGE_smartdns=m" >> .config
          make defconfig

      - name: Download sources
        working-directory: ${{ env.SDK_DIR }}
        run: make package/smartdns/download V=s

      - name: Compile
        working-directory: ${{ env.SDK_DIR }}
        run: make package/smartdns/compile V=s -j$(nproc)

      - name: Collect artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          mkdir -p /tmp/artifacts
          find bin/packages/ -name "*smartdns*.apk" -exec cp {} /tmp/artifacts/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-flint2
          path: /tmp/artifacts/*.apk
